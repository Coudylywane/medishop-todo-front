name: CD Front

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Convertir le nom du repo en minuscules
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Convertir le nom du repo en minuscules
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Déploiement via SSH direct (Front)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONT_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE=ghcr.io/${{ steps.repo.outputs.name }}:latest
            docker pull $IMAGE

            if [ "$(docker ps -aq -f name=todo-front)" ]; then
              RUNNING_IMAGE=$(docker inspect --format='{{.Config.Image}}' todo-front)
              docker tag $RUNNING_IMAGE ghcr.io/${{ steps.repo.outputs.name }}:previous || true
              docker stop todo-front || true
              docker rm todo-front || true
            fi

            docker run -d --name todo-front \
              --restart unless-stopped \
              -p 3000:80 \
              $IMAGE

            for i in $(seq 1 10); do
              if curl -sf http://localhost:3000 > /dev/null; then
                echo "Déploiement réussi."
                exit 0
              fi
              echo "Tentative $i/10, attente..."
              sleep 5
            done

            echo "Déploiement échoué, rollback en cours..."
            docker stop todo-front || true
            docker rm todo-front || true
            docker run -d --name todo-front \
              --restart unless-stopped \
              -p 3000:80 \
              ghcr.io/${{ steps.repo.outputs.name }}:previous
            exit 1